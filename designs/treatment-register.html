<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀸즈헤나 CRM - 시술 등록</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #5A7163; --primary-light: #8BA895; --background: #F9F8F6; 
            --surface: #FFFFFF; --text-main: #333333; --text-muted: #777777; 
            --border: #EAE6DF; --radius-md: 12px; --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); display: flex; min-height: 100vh; }

        .sidebar { width: 250px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; white-space: nowrap; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 16px; border-radius: var(--radius-md); color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: var(--transition); }
        .nav-item.active { background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(90, 113, 99, 0.3); }
        .nav-item:not(.active):hover { background-color: var(--background); color: var(--primary); transform: translateX(4px); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h1 { font-size: 28px; font-weight: 700; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px;}
        .card-title { font-size: 18px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; color: var(--text-main); }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; text-align: center; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }

        .recipe-box { background: rgba(90, 113, 99, 0.05); padding: 16px; border-radius: 12px; border: 1px dashed var(--primary); }
    
        /* 모바일 반응형 추가 */
        .mobile-header { display: none; padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 900; }
        .mobile-header .logo { font-size: 20px; margin: 0; }
        .menu-toggle { background: none; border: none; font-size: 24px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: -280px; height: 100vh; z-index: 1000; width: 280px; box-shadow: var(--shadow-md); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar.active { left: 0; }
            .main-content { padding: 16px; overflow-x: hidden; }
            
            .dashboard-grid, .grid-layout, .grid, .kpi-section, .settings-container, .summary-grid { display: flex !important; flex-direction: column; gap: 16px; height: auto; }
            .widget-main, .widget-side, .settings-nav { width: 100%; }
            
            .header { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
            .header .user-profile, .header select, .header .btn-primary { width: 100%; justify-content: center; }
            .header-right { width: 100%; justify-content: stretch; overflow-x: auto; padding-bottom: 4px; }
            .header-right .btn { flex-shrink: 0; }
            
            .search-bar { flex-direction: column; align-items: stretch; }
            .search-input-wrapper { max-width: 100%; }
            .filter-buttons { overflow-x: auto; padding-bottom: 8px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
            
            /* 카드 내부 테이블 스크롤 처리 */
            .card { overflow-x: auto; padding: 16px; }
            .card table { min-width: 500px; }
            
            .tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 8px; }
            .time-table th { min-width: 80px; }
            .time-table td:nth-child(2) { min-width: 400px; }
        }

    </style>
</head>
<body>

    

    <!-- 모바일 타이틀 바 -->
    <div class="mobile-header">
        <div class="logo"><i class="ph-fill ph-plant"></i>Queens Henna</div>
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.add('active'); document.querySelector('.sidebar-overlay').classList.add('active');"><i class="ph ph-list"></i></button>
    </div>
    
    <!-- 모바일 사이드바 배경 -->
    <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('active'); document.querySelector('.sidebar-overlay').classList.remove('active');"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div class="logo" style="margin: 0;"><i class="ph-fill ph-plant"></i>Queens Henna</div>
            <button class="menu-toggle" style="display: none;" onclick="document.querySelector('.sidebar').classList.remove('active'); document.querySelector('.sidebar-overlay').classList.remove('active');" id="mobile-close-btn"><i class="ph ph-x"></i></button>
        </div>
        <style>@media (max-width: 768px) { #mobile-close-btn { display: block !important; } .sidebar .logo { font-size: 20px; } .sidebar { gap: 16px !important; } }</style>

        <nav>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i>대시보드</a></li>
                <li><a href="customers.html" class="nav-item"><i class="ph ph-users"></i>고객관리</a></li>
                <li><a href="reservations.html" class="nav-item"><i class="ph ph-calendar-check"></i>예약관리</a></li>
                <li><a href="treatment-register.html" class="nav-item active"><i class="ph ph-clipboard-text"></i>시술기록</a></li>
                <li><a href="inventory.html" class="nav-item"><i class="ph ph-drop"></i>염색약관리</a></li>
                <li><a href="sms.html" class="nav-item"><i class="ph ph-chat-circle-text"></i>문자발송</a></li>
                <li><a href="sales.html" class="nav-item"><i class="ph ph-chart-line-up"></i>매출통계</a></li>
                <li><a href="settings.html" class="nav-item"><i class="ph ph-gear"></i>설정 및 백업</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>시술 등록</h1>
        </header>

        <div class="grid">
            <!-- 좌측: 기본 정보 입력 -->
            <div class="card">
                <div class="card-title">시술 기본 정보</div>
                
                <div class="form-group">
                    <label>고객 선택 <span style="color:red">*</span></label>
                    <input type="text" placeholder="이름이나 전화번호로 고객 검색..." value="김미영 (010-1234-5678)">
                </div>

                <div class="form-group">
                    <label>시술 종류 <span style="color:red">*</span></label>
                    <select>
                        <option>헤나 기본 염색</option>
                        <option selected>헤나 기본 염색 + 두피케어</option>
                        <option>얼굴 마사지</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>기본 금액</label>
                        <input type="text" value="30,000" style="text-align: right;" disabled>
                    </div>
                    <div class="form-group">
                        <label>추가 금액</label>
                        <input type="text" value="50,000" style="text-align: right;">
                    </div>
                </div>

                <div class="form-group">
                    <label>총 결제 금액</label>
                    <input type="text" value="80,000" style="text-align: right; font-weight: bold; font-size: 18px; color: var(--primary);" readonly>
                </div>

                <div class="form-group">
                    <label>결제 수단</label>
                    <select>
                        <option>카드</option>
                        <option>현금</option>
                        <option>계좌이체</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>메모</label>
                    <textarea rows="3" placeholder="시술 관련 특이사항을 적어주세요"></textarea>
                </div>
            </div>

            <!-- 우측: 염색약 사용량 입력 -->
            <div class="card" style="height: fit-content;">
                <div class="card-title">
                    <span>사용 염색약 입력</span>
                    <button class="btn-outline"><i class="ph ph-magic-wand"></i> 고객 레시피 불러오기</button>
                </div>

                <div class="recipe-box">
                    <strong>김미영 님의 보유 염색약 현황</strong>
                    <ul style="margin-top: 8px; margin-left: 20px; font-size: 14px; color: var(--text-muted)">
                        <li>내츄럴 브라운: 175g 잔여</li>
                        <li>오렌지 헤나: 25g 잔여 (부족)</li>
                    </ul>
                </div>

                <div class="form-group" style="margin-top: 16px;">
                    <div style="display: flex; gap: 12px; margin-bottom: 8px;">
                        <select style="flex: 2;"><option>내츄럴 브라운</option></select>
                        <input type="number" style="flex: 1;" value="50">
                        <select style="flex: 1;"><option>g</option><option>국자</option></select>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <select style="flex: 2;"><option>오렌지 헤나</option></select>
                        <input type="number" style="flex: 1;" value="25">
                        <select style="flex: 1;"><option>g</option><option>국자</option></select>
                    </div>
                </div>

                <button class="btn-outline" style="width:fit-content; margin-top:8px;">+ 약재 추가</button>

                <div style="margin-top: 32px;">
                    <button class="btn-primary" style="width: 100%;">시술 등록 완료하기</button>
                    <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 12px;">
                        저장 시 고객님의 염색약 잔여량이 자동 차감됩니다.
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

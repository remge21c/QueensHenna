<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀸즈헤나 CRM - 예약 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #5A7163; --background: #F9F8F6; --surface: #FFFFFF; 
            --text-main: #333333; --text-muted: #777777; --border: #EAE6DF;
            --radius-md: 12px; --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); display: flex; min-height: 100vh; }

        .sidebar { width: 250px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; white-space: nowrap; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 16px; border-radius: var(--radius-md); color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: var(--transition); }
        .nav-item.active { background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(90, 113, 99, 0.3); }
        .nav-item:not(.active):hover { background-color: var(--background); color: var(--primary); transform: translateX(4px); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h1 { font-size: 28px; font-weight: 700; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 24px; }
        .date-nav { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 16px; }
        .nav-arrow { border: 1px solid var(--border); background: var(--surface); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        
        .time-table { width: 100%; border-collapse: collapse; }
        .time-table th { padding: 16px; border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.02); text-align: left; }
        .time-table td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: top; }
        .time-cell { padding: 20px 16px; font-weight: 600; color: var(--text-muted); border-right: 1px solid var(--border); width: 100px; text-align: center; }
        .slot-cell { padding: 12px; }

        .reservation-card { background: rgba(90, 113, 99, 0.05); border-left: 4px solid var(--primary); padding: 12px 16px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .reservation-card.empty { background: transparent; border: 1px dashed var(--border); color: var(--text-muted); text-align: center; cursor: pointer; padding: 16px; }
        .reservation-card.empty:hover { background: rgba(0,0,0,0.02); }
        
        .res-info { display: flex; flex-direction: column; gap: 4px; }
        .res-name { font-weight: 600; font-size: 15px; }
        .res-meta { font-size: 13px; color: var(--text-muted); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge.completed { background: #E0E0E0; color: #555; }
        .badge.active { background: rgba(90, 113, 99, 0.1); color: var(--primary); }
    
        /* 모바일 반응형 추가 */
        .mobile-header { display: none; padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 900; }
        .mobile-header .logo { font-size: 20px; margin: 0; }
        .menu-toggle { background: none; border: none; font-size: 24px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: -280px; height: 100vh; z-index: 1000; width: 280px; box-shadow: var(--shadow-md); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar.active { left: 0; }
            .main-content { padding: 16px; overflow-x: hidden; }
            
            .dashboard-grid, .grid-layout, .grid, .kpi-section, .settings-container, .summary-grid { display: flex !important; flex-direction: column; gap: 16px; height: auto; }
            .widget-main, .widget-side, .settings-nav { width: 100%; }
            
            .header { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
            .header .user-profile, .header select, .header .btn-primary { width: 100%; justify-content: center; }
            .header-right { width: 100%; justify-content: stretch; overflow-x: auto; padding-bottom: 4px; }
            .header-right .btn { flex-shrink: 0; }
            
            .search-bar { flex-direction: column; align-items: stretch; }
            .search-input-wrapper { max-width: 100%; }
            .filter-buttons { overflow-x: auto; padding-bottom: 8px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
            
            /* 카드 내부 테이블 스크롤 처리 */
            .card { overflow-x: auto; padding: 16px; }
            .card table { min-width: 500px; }
            
            .tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 8px; }
            .time-table th { min-width: 80px; }
            .time-table td:nth-child(2) { min-width: 400px; }
        }

    </style>
</head>
<body>

    

    <!-- 모바일 타이틀 바 -->
    <div class="mobile-header">
        <div class="logo"><i class="ph-fill ph-plant"></i>Queens Henna</div>
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.add('active'); document.querySelector('.sidebar-overlay').classList.add('active');"><i class="ph ph-list"></i></button>
    </div>
    
    <!-- 모바일 사이드바 배경 -->
    <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('active'); document.querySelector('.sidebar-overlay').classList.remove('active');"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div class="logo" style="margin: 0;"><i class="ph-fill ph-plant"></i>Queens Henna</div>
            <button class="menu-toggle" style="display: none;" onclick="document.querySelector('.sidebar').classList.remove('active'); document.querySelector('.sidebar-overlay').classList.remove('active');" id="mobile-close-btn"><i class="ph ph-x"></i></button>
        </div>
        <style>@media (max-width: 768px) { #mobile-close-btn { display: block !important; } .sidebar .logo { font-size: 20px; } .sidebar { gap: 16px !important; } }</style>

        <nav>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i>대시보드</a></li>
                <li><a href="customers.html" class="nav-item"><i class="ph ph-users"></i>고객관리</a></li>
                <li><a href="reservations.html" class="nav-item active"><i class="ph ph-calendar-check"></i>예약관리</a></li>
                <li><a href="treatment-register.html" class="nav-item"><i class="ph ph-clipboard-text"></i>시술기록</a></li>
                <li><a href="inventory.html" class="nav-item"><i class="ph ph-drop"></i>염색약관리</a></li>
                <li><a href="sms.html" class="nav-item"><i class="ph ph-chat-circle-text"></i>문자발송</a></li>
                <li><a href="sales.html" class="nav-item"><i class="ph ph-chart-line-up"></i>매출통계</a></li>
                <li><a href="settings.html" class="nav-item"><i class="ph ph-gear"></i>설정 및 백업</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>예약 관리</h1>
            <button class="btn-primary"><i class="ph ph-plus"></i> 새 예약 등록</button>
        </header>

        <div class="card">
            <div class="calendar-header">
                <div class="date-nav">
                    <button class="nav-arrow"><i class="ph ph-caret-left"></i></button>
                    2026. 04. 07 (화)
                    <button class="nav-arrow"><i class="ph ph-caret-right"></i></button>
                </div>
            </div>

            <table class="time-table">
                <tbody>
                    <tr>
                        <td class="time-cell">10:00</td>
                        <td class="slot-cell">
                            <div class="reservation-card" style="opacity: 0.7;">
                                <div class="res-info">
                                    <span class="res-name">김미영님</span>
                                    <span class="res-meta">기본 염색 예약</span>
                                </div>
                                <span class="badge completed">방문완료</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="time-cell">11:00</td>
                        <td class="slot-cell">
                            <div class="reservation-card">
                                <div class="res-info">
                                    <span class="res-name">이현주님</span>
                                    <span class="res-meta">오렌지 + 두피 예약</span>
                                </div>
                                <span class="badge active">예약완료 (11:30)</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="time-cell">12:00</td>
                        <td class="slot-cell">
                            <div class="reservation-card empty"><i class="ph ph-plus"></i> 이 시간에 예약 추가하기</div>
                        </td>
                    </tr>
                    <tr>
                        <td class="time-cell">13:00</td>
                        <td class="slot-cell">
                            <div class="reservation-card empty"><i class="ph ph-plus"></i> 이 시간에 예약 추가하기</div>
                        </td>
                    </tr>
                    <tr>
                        <td class="time-cell">14:00</td>
                        <td class="slot-cell">
                            <div class="reservation-card">
                                <div class="res-info">
                                    <span class="res-name">박수진님</span>
                                    <span class="res-meta">헤나 잔량 확인 필요</span>
                                </div>
                                <span class="badge active">예약완료 (14:00)</span>
                            </div>
                            <!-- PRD: 겹치는 예약 허용 및 경고 표시 -->
                            <div class="reservation-card" style="border-left-color: #E07A5F; background: rgba(224, 122, 95, 0.05);">
                                <div class="res-info">
                                    <span class="res-name" style="color:#E07A5F;"><i class="ph-fill ph-warning"></i> 중복 예약: 이수민님</span>
                                </div>
                                <span class="badge" style="background:#E07A5F; color:white;">예약완료 (14:30)</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
